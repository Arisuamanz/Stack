<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack - Versi Santai & Cozy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Gradien warna pastel yang lebih lembut */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            touch-action: none; /* Mencegah zoom/scroll di HP */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        
        body {
            transition: background 3s ease;
        }
    </style>
</head>
<body>

    <!-- Container Canvas 3D -->
    <div id="game-container"></div>

    <!-- Lapisan UI (Tampilan Layar) -->
    <div id="ui-layer" class="p-6">
        <div class="flex justify-between items-start w-full">
            <div id="score-display" class="text-6xl font-light text-white drop-shadow-md transition-all transform scale-100">0</div>
            <div class="text-right">
                <div id="combo-display" class="text-xl font-bold text-white drop-shadow-md opacity-0 transition-opacity">Sempurna!</div>
                <div id="best-score" class="text-lg font-medium text-white/80 drop-shadow-md">Terbaik: 0</div>
            </div>
        </div>

        <!-- Layar Mulai -->
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/10 backdrop-blur-sm pointer-events-auto transition-opacity duration-500">
            <h1 class="text-6xl font-extrabold text-white mb-2 drop-shadow-lg tracking-wider">STACK</h1>
            <p class="text-white/90 mb-8 text-xl font-medium drop-shadow animate-pulse">Ketuk layar untuk mulai</p>
        </div>

        <!-- Layar Game Over -->
        <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/30 backdrop-blur-md pointer-events-auto opacity-0 hidden transition-opacity duration-500">
            <h2 class="text-5xl font-bold text-white mb-2 drop-shadow-lg">Permainan Berakhir</h2>
            <p class="text-white/90 mb-8 text-2xl font-medium drop-shadow" id="final-score-text">Skor: 0</p>
            <button id="restart-btn" class="px-8 py-4 bg-white/90 text-gray-700 font-bold rounded-full shadow-xl hover:bg-white transform hover:scale-105 transition-all active:scale-95 text-xl pointer-events-auto">
                Coba Lagi
            </button>
        </div>
    </div>

<script>
/**
 * LOGIKA GAME STACK
 * Dibuat dengan Three.js & Web Audio API (Cozy Edition)
 */

// --- Pengaturan Audio API yang Lebih Santai (Cozy) ---
let audioCtx;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// Fungsi utama untuk membuat nada yang lembut
function playCozyTone(freq, type = 'sine', attack = 0.05, release = 0.5, volume = 0.2) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // Tambahkan lowpass filter agar suaranya tidak tajam di telinga
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = freq * 1.5; // Menyaring frekuensi tinggi yang kasar
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    // Envelope (Bentuk suara: memudar masuk perlahan, memudar keluar perlahan)
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + attack + release);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + attack + release);
}

function playDropSound() {
    // Suara "thud" (ketukan kayu/marimba) yang pelan dan hangat
    playCozyTone(180, 'sine', 0.02, 0.3, 0.2);
}

function playPerfectSound(comboCount) {
    // Tangga nada Pentatonik (sangat rileks dan santai) - 2 Oktaf
    const pentatonic = [
        261.63, // C4
        293.66, // D4
        329.63, // E4
        392.00, // G4
        440.00, // A4
        523.25, // C5
        587.33, // D5
        659.25, // E5
        783.99, // G5
        880.00  // A5
    ];
    
    // Batasi agar tidak melampaui array, lalu berputar kembali dengan perlahan
    const noteIndex = comboCount % pentatonic.length;
    const freq = pentatonic[noteIndex];
    
    // Suara utama mirip vibraphone (lembut, memudar lama)
    playCozyTone(freq, 'sine', 0.05, 0.8, 0.15);
    
    // Tambahkan sedikit harmoni tipis jika combonya sudah lumayan tinggi
    if (comboCount > 3) {
        playCozyTone(freq * 1.5, 'sine', 0.1, 0.6, 0.03); // Nada kelima (Perfect fifth) pelan
    }
}

function playGameOverSound() {
    // Suara game over berupa chord bass yang perlahan memudar, tidak kasar
    playCozyTone(130.81, 'sine', 0.1, 1.5, 0.2); // C3
    playCozyTone(98.00, 'sine', 0.2, 1.5, 0.2);  // G2
}

// --- Variabel Game ---
let scene, camera, renderer;
let stack = [];
let overhangs = [];
let activeBlock = null;

const BLOCK_HEIGHT = 1;
const INITIAL_SIZE = 6;
const MOVE_SPEED_START = 0.12; // Sedikit diperlambat agar lebih rileks
let currentSpeed = MOVE_SPEED_START;
const TOLERANCE = 0.25; // Toleransi sedikit diperbesar agar lebih santai

let score = 0;
// Mengambil high score dari localStorage
let bestScore = parseInt(localStorage.getItem('stack_best_score_cozy')) || 0;
let combo = 0;
let gameStarted = false;
let gameOver = false;
let currentAxis = 'x';
let movingDir = 1;

// Warna awal pastel
let hueStart = Math.random();

// Elemen UI
const scoreDisplay = document.getElementById('score-display');
const bestScoreDisplay = document.getElementById('best-score');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const restartBtn = document.getElementById('restart-btn');
const finalScoreText = document.getElementById('final-score-text');

bestScoreDisplay.innerText = `Terbaik: ${bestScore}`;

// --- Inisialisasi ---
function init() {
    // 1. Setup Scene
    scene = new THREE.Scene();

    // 2. Setup Kamera (Ortografik untuk tampilan isometrik)
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(10, 10, 10);
    camera.lookAt(0, 0, 0);

    // 3. Setup Renderer
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Bayangan lembut
    document.getElementById('game-container').appendChild(renderer.domElement);

    // 4. Pencahayaan
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); // Sedikit diterangkan
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    // Resize event
    window.addEventListener('resize', onWindowResize, false);

    // Event interaksi
    window.addEventListener('mousedown', handleInteraction);
    window.addEventListener('touchstart', (e) => { 
        if(e.target === restartBtn) return; 
        e.preventDefault(); 
        handleInteraction(); 
    }, { passive: false });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInteraction(); });

    restartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        resetGame();
    });

    createBase();
    animate();
}

function onWindowResize() {
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera.left = -d * aspect;
    camera.right = d * aspect;
    camera.top = d;
    camera.bottom = -d;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Material & Warna Pastel ---
function getBlockMaterial(index) {
    const color = new THREE.Color();
    // Warna diatur lebih terang dan soft (saturation menengah, lightness tinggi)
    color.setHSL((hueStart + index * 0.01) % 1, 0.5, 0.75);
    return new THREE.MeshLambertMaterial({ color: color });
}

function updateBackground(index) {
    const color1 = new THREE.Color().setHSL((hueStart + index * 0.01) % 1, 0.6, 0.85).getHexString();
    const color2 = new THREE.Color().setHSL((hueStart + index * 0.01 + 0.1) % 1, 0.6, 0.75).getHexString();
    document.body.style.background = `linear-gradient(135deg, #${color1} 0%, #${color2} 100%)`;
}

// --- Logika Permainan ---
function createBase() {
    const geometry = new THREE.BoxGeometry(INITIAL_SIZE, BLOCK_HEIGHT * 10, INITIAL_SIZE);
    const material = getBlockMaterial(0);
    const base = new THREE.Mesh(geometry, material);
    
    base.position.set(0, -BLOCK_HEIGHT * 5 + (BLOCK_HEIGHT / 2), 0);
    base.receiveShadow = true;
    base.castShadow = true;
    
    scene.add(base);
    stack.push({
        mesh: base,
        width: INITIAL_SIZE,
        depth: INITIAL_SIZE,
        x: 0,
        z: 0
    });
    
    updateBackground(0);
}

function spawnBlock() {
    const topBlock = stack[stack.length - 1];
    const width = topBlock.width;
    const depth = topBlock.depth;
    const yPos = stack.length * BLOCK_HEIGHT;
    
    const geometry = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const material = getBlockMaterial(stack.length);
    activeBlock = new THREE.Mesh(geometry, material);
    activeBlock.castShadow = true;
    activeBlock.receiveShadow = true;

    const startOffset = 15;
    if (currentAxis === 'x') {
        activeBlock.position.set(-startOffset, yPos, topBlock.z);
    } else {
        activeBlock.position.set(topBlock.x, yPos, -startOffset);
    }
    
    scene.add(activeBlock);
    movingDir = 1;
}

function handleInteraction() {
    initAudio(); // Wajib untuk membuka AudioContext di browser modern

    if (gameOver) return;
    
    if (!gameStarted) {
        startGame();
        return;
    }

    const topBlock = stack[stack.length - 1];
    let tx1, tx2, cx1, cx2;
    let posDim = currentAxis;

    if (currentAxis === 'x') {
        tx1 = topBlock.x - topBlock.width / 2;
        tx2 = topBlock.x + topBlock.width / 2;
        cx1 = activeBlock.position.x - activeBlock.geometry.parameters.width / 2;
        cx2 = activeBlock.position.x + activeBlock.geometry.parameters.width / 2;
    } else {
        tx1 = topBlock.z - topBlock.depth / 2;
        tx2 = topBlock.z + topBlock.depth / 2;
        cx1 = activeBlock.position.z - activeBlock.geometry.parameters.depth / 2;
        cx2 = activeBlock.position.z + activeBlock.geometry.parameters.depth / 2;
    }

    const overlapMin = Math.max(tx1, cx1);
    const overlapMax = Math.min(tx2, cx2);
    const overlapSize = overlapMax - overlapMin;

    if (overlapSize <= 0) {
        dropFullBlock(activeBlock);
        endGame();
        return;
    }

    const delta = Math.abs(activeBlock.position[posDim] - topBlock[posDim]);

    if (delta <= TOLERANCE) {
        // Penempatan Sempurna
        combo++;
        playPerfectSound(combo - 1);
        
        createPerfectFlash(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z, topBlock.width, topBlock.depth);
        showComboText(combo);
        
        activeBlock.position[posDim] = topBlock[posDim];
        
        let newWidth = topBlock.width;
        let newDepth = topBlock.depth;
        
        if (combo >= 5) {
            const growthAmount = 0.5;
            if (currentAxis === 'x' && newWidth < INITIAL_SIZE) newWidth = Math.min(INITIAL_SIZE, newWidth + growthAmount);
            if (currentAxis === 'z' && newDepth < INITIAL_SIZE) newDepth = Math.min(INITIAL_SIZE, newDepth + growthAmount);
            
            scene.remove(activeBlock);
            const geom = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
            const mat = getBlockMaterial(stack.length);
            activeBlock = new THREE.Mesh(geom, mat);
            activeBlock.position.set(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z);
            activeBlock.castShadow = true;
            activeBlock.receiveShadow = true;
            scene.add(activeBlock);
        }

        stack.push({ mesh: activeBlock, width: newWidth, depth: newDepth, x: activeBlock.position.x, z: activeBlock.position.z });

    } else {
        // Penempatan Terpotong
        combo = 0;
        hideComboText();
        playDropSound();

        const newCenter = (overlapMin + overlapMax) / 2;
        
        let newWidth = currentAxis === 'x' ? overlapSize : topBlock.width;
        let newDepth = currentAxis === 'z' ? overlapSize : topBlock.depth;
        let newX = currentAxis === 'x' ? newCenter : topBlock.x;
        let newZ = currentAxis === 'z' ? newCenter : topBlock.z;

        scene.remove(activeBlock);
        const fittedGeometry = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
        const fittedMaterial = getBlockMaterial(stack.length);
        const fittedBlock = new THREE.Mesh(fittedGeometry, fittedMaterial);
        fittedBlock.position.set(newX, stack.length * BLOCK_HEIGHT, newZ);
        fittedBlock.castShadow = true;
        fittedBlock.receiveShadow = true;
        scene.add(fittedBlock);

        stack.push({ mesh: fittedBlock, width: newWidth, depth: newDepth, x: newX, z: newZ });

        let debrisMin, debrisMax;
        if (cx1 < tx1) {
            debrisMin = cx1;
            debrisMax = tx1;
        } else {
            debrisMin = tx2;
            debrisMax = cx2;
        }
        
        const debrisSize = debrisMax - debrisMin;
        const debrisCenter = (debrisMin + debrisMax) / 2;
        
        let debWidth = currentAxis === 'x' ? debrisSize : newWidth;
        let debDepth = currentAxis === 'z' ? debrisSize : newDepth;
        let debX = currentAxis === 'x' ? debrisCenter : newX;
        let debZ = currentAxis === 'z' ? debrisCenter : newZ;

        createDebris(debWidth, debDepth, debX, stack.length * BLOCK_HEIGHT, debZ, currentAxis, cx1 < tx1 ? -1 : 1, fittedMaterial);
    }

    score++;
    updateScoreUI();
    updateBackground(score);
    
    // Kecepatan maksimal dibatasi agar tetap "santai" dan tidak terlalu brutal
    currentSpeed = Math.min(0.25, MOVE_SPEED_START + (score * 0.003));
    
    currentAxis = currentAxis === 'x' ? 'z' : 'x';
    spawnBlock();
}

function createDebris(width, depth, x, y, z, axis, direction, material) {
    const geom = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const mesh = new THREE.Mesh(geom, material);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    scene.add(mesh);

    overhangs.push({
        mesh: mesh,
        vy: 0,
        vx: axis === 'x' ? direction * 0.04 : 0,
        vz: axis === 'z' ? direction * 0.04 : 0,
        rx: axis === 'z' ? direction * 0.08 : 0,
        rz: axis === 'x' ? -direction * 0.08 : 0
    });
}

function dropFullBlock(blockMesh) {
    overhangs.push({
        mesh: blockMesh,
        vy: 0,
        vx: 0,
        vz: 0,
        rx: (Math.random() - 0.5) * 0.1,
        rz: (Math.random() - 0.5) * 0.1
    });
    activeBlock = null;
}

function createPerfectFlash(x, y, z, w, d) {
    let active = true;
    let currentScale = 1.0;
    
    const geom = new THREE.BoxGeometry(w, 0.1, d);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
    const flash = new THREE.Mesh(geom, mat);
    
    flash.position.set(x, y, z);
    scene.add(flash);

    const animateFlash = () => {
        if (!active) return;
        currentScale += 0.04;
        flash.scale.set(currentScale, 1, currentScale);
        flash.material.opacity -= 0.05;
        
        if (flash.material.opacity <= 0) {
            scene.remove(flash);
            flash.geometry.dispose();
            flash.material.dispose();
            active = false;
        } else {
            requestAnimationFrame(animateFlash);
        }
    };
    animateFlash();
}

// --- Fungsi UI ---
function updateScoreUI() {
    scoreDisplay.innerText = score;
    scoreDisplay.classList.remove('scale-100');
    scoreDisplay.classList.add('scale-110');
    setTimeout(() => {
        scoreDisplay.classList.remove('scale-110');
        scoreDisplay.classList.add('scale-100');
    }, 150);
}

function showComboText(count) {
    if (count > 1) {
        comboDisplay.innerText = `Sempurna x${count}!`;
        comboDisplay.style.opacity = 1;
        comboDisplay.style.transform = `translateY(-3px)`;
        setTimeout(() => { comboDisplay.style.transform = `translateY(0)`; }, 200);
    }
}

function hideComboText() {
    comboDisplay.style.opacity = 0;
}

function startGame() {
    startScreen.classList.add('opacity-0');
    setTimeout(() => { 
        startScreen.classList.add('hidden'); 
    }, 500);
    gameStarted = true;
    spawnBlock();
}

function endGame() {
    gameOver = true;
    playGameOverSound();
    
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('stack_best_score_cozy', bestScore.toString());
        bestScoreDisplay.innerText = `Terbaik: ${bestScore}`;
        bestScoreDisplay.classList.add('text-green-200', 'font-bold', 'scale-110');
        setTimeout(() => bestScoreDisplay.classList.remove('text-green-200', 'font-bold', 'scale-110'), 800);
    }
    
    finalScoreText.innerText = `Skor Kamu: ${score}`;
    
    gameOverScreen.classList.remove('hidden');
    setTimeout(() => {
        gameOverScreen.classList.remove('opacity-0');
    }, 100);
}

function resetGame() {
    stack.forEach(b => scene.remove(b.mesh));
    overhangs.forEach(o => scene.remove(o.mesh));
    if (activeBlock) scene.remove(activeBlock);
    
    stack = [];
    overhangs = [];
    activeBlock = null;
    
    score = 0;
    combo = 0;
    currentSpeed = MOVE_SPEED_START;
    currentAxis = 'x';
    gameOver = false;
    hueStart = Math.random(); 
    
    updateScoreUI();
    hideComboText();
    
    camera.position.y = 10;
    
    gameOverScreen.classList.add('opacity-0');
    setTimeout(() => {
        gameOverScreen.classList.add('hidden');
        createBase();
        spawnBlock();
    }, 500);
}

// --- Loop Animasi Utama ---
function animate() {
    requestAnimationFrame(animate);

    if (gameStarted && !gameOver && activeBlock) {
        activeBlock.position[currentAxis] += currentSpeed * movingDir;

        const bounds = 15;
        if (activeBlock.position[currentAxis] > bounds || activeBlock.position[currentAxis] < -bounds) {
            movingDir *= -1; 
            activeBlock.position[currentAxis] = Math.sign(activeBlock.position[currentAxis]) * bounds;
        }
    }

    if (stack.length > 0) {
        const targetY = (stack.length * BLOCK_HEIGHT) + 5;
        camera.position.y += (targetY - camera.position.y) * 0.08; // Pergerakan kamera dibuat lebih halus
    }

    for (let i = overhangs.length - 1; i >= 0; i--) {
        const oh = overhangs[i];
        oh.vy -= 0.015; // Gravitasi sedikit lebih lambat
        oh.mesh.position.y += oh.vy;
        oh.mesh.position.x += oh.vx;
        oh.mesh.position.z += oh.vz;
        
        oh.mesh.rotation.x += oh.rx;
        oh.mesh.rotation.z += oh.rz;

        if (oh.mesh.position.y < camera.position.y - 30) {
            scene.remove(oh.mesh);
            oh.mesh.geometry.dispose();
            oh.mesh.material.dispose();
            overhangs.splice(i, 1);
        }
    }

    renderer.render(scene, camera);
}

window.onload = init;

</script>
</body>
</html>

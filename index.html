<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack - Edisi Legenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        body {
            transition: background 3s ease;
        }

        /* --- SISTEM TIER CSS --- */
        /* Tier D (0-20): Kelabu gelap, tanpa glow */
        .tier-d { 
            color: #9ca3af; 
            text-shadow: none; 
        }
        /* Tier C (21-40): Hijau, soft glow ringan */
        .tier-c { 
            color: #4ade80; 
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.6); 
        }
        /* Tier B (41-70): Biru terang, gradien ringan */
        .tier-b {
            background: linear-gradient(to right, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.7));
        }
        /* Tier A (71-100): Ungu neon, glow epik */
        .tier-a {
            background: linear-gradient(to right, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(192, 132, 252, 1));
        }
        /* Tier S (100+): Emas (Gold) Legendary dengan animasi Shine */
        .tier-s {
            background: linear-gradient(to right, #fde047, #f59e0b, #fffbeb, #fde047);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(250, 204, 21, 1));
            animation: goldShine 2s linear infinite;
        }

        @keyframes goldShine {
            to { background-position: 200% center; }
        }

        /* Animasi Pop untuk Combo Sempurna */
        @keyframes popCombo {
            0% { transform: translate(-50%, -10px) scale(0.8); opacity: 0; }
            50% { transform: translate(-50%, 0) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
        .combo-active {
            animation: popCombo 0.3s ease forwards;
        }
    </style>
</head>
<body>

    <!-- Container Canvas 3D -->
    <div id="game-container"></div>

    <div id="ui-layer">
        <!-- Top Bar: Tier & Best Score -->
        <div class="absolute top-6 left-6 right-6 flex justify-between items-start">
            <div class="flex items-center gap-3 bg-black/20 px-5 py-2 rounded-full backdrop-blur-md border border-white/20 shadow-lg transition-transform duration-300" id="best-score-container">
                <div id="best-tier-badge" class="text-3xl font-black tier-d italic pr-1">D</div>
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-widest text-white/70 -mb-1">Terbaik</span>
                    <span id="best-score-val" class="text-xl font-bold text-white">0</span>
                </div>
            </div>
        </div>

        <!-- Center Top Area: Main Score & Combo -->
        <div class="absolute top-24 left-1/2 transform -translate-x-1/2 flex flex-col items-center">
            <div id="score-display" class="text-8xl font-black text-white drop-shadow-lg transition-all transform scale-100 mb-2">0</div>
            
            <div id="combo-display" class="text-2xl font-black text-yellow-300 drop-shadow-md opacity-0 absolute top-full mt-2 whitespace-nowrap tracking-wide">
                Sempurna!
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/10 backdrop-blur-sm pointer-events-auto transition-opacity duration-500">
            <h1 class="text-7xl font-extrabold text-white mb-2 drop-shadow-xl tracking-wider">STACK</h1>
            <p class="text-white/90 mb-8 text-2xl font-medium drop-shadow-md animate-pulse">Ketuk layar untuk mula</p>
        </div>

        <!-- Game Over Screen (Centered) -->
        <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 backdrop-blur-md pointer-events-auto opacity-0 hidden transition-opacity duration-500">
            <div class="bg-white/10 p-10 rounded-3xl backdrop-blur-xl flex flex-col items-center shadow-2xl border border-white/20 min-w-[320px]">
                <h2 class="text-2xl font-bold text-white mb-2 drop-shadow-lg text-center uppercase tracking-widest text-white/80">Permainan Tamat</h2>
                
                <div class="text-8xl font-black text-white mb-6 drop-shadow-xl" id="final-score-text">0</div>
                
                <div class="flex items-center justify-center gap-4 mb-10 bg-black/30 w-full py-4 rounded-2xl border border-white/10">
                    <span id="final-tier-badge" class="text-5xl font-black italic">D</span>
                    <span id="final-tier-name" class="text-lg font-bold uppercase tracking-widest text-white/80">Pemula</span>
                </div>
                
                <button id="restart-btn" class="w-full py-4 bg-white text-blue-600 font-bold rounded-full shadow-[0_0_20px_rgba(255,255,255,0.4)] hover:bg-gray-100 transform hover:scale-105 transition-all active:scale-95 text-xl pointer-events-auto">
                    Cuba Lagi
                </button>
            </div>
        </div>
    </div>

<script>
/**
 * LOGIK GAME STACK - EDISI LEGENDA
 * Lengkap dengan fizik serpihan jatuh dan audio tinggi
 */

// --- Fungsi Sistem Tier (Pangkat) Dikemas Kini ---
function getTierInfo(score) {
    if (score <= 20) return { label: 'D', className: 'tier-d', name: 'Pemula' };
    if (score <= 40) return { label: 'C', className: 'tier-c', name: 'Biasa' };
    if (score <= 70) return { label: 'B', className: 'tier-b', name: 'Mahir' };
    if (score <= 100) return { label: 'A', className: 'tier-a', name: 'Epik' };
    return { label: 'S', className: 'tier-s', name: 'Legenda' };
}

// --- Pengaturan Audio API (Volume 200%) ---
let audioCtx;
let masterGain;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 3.0; // Volume Tinggi (200%+)
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playCozyTone(freq, type = 'sine', attack = 0.05, release = 0.5, volume = 0.8) { 
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    filter.type = 'lowpass';
    filter.frequency.value = freq * 1.5;
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + attack + release);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain); 
    
    osc.start();
    osc.stop(audioCtx.currentTime + attack + release);
}

function playDropSound() {
    playCozyTone(180, 'sine', 0.02, 0.3, 0.7); 
}

function playPerfectSound(comboCount) {
    const pentatonic = [
        261.63, 293.66, 329.63, 392.00, 440.00, 
        523.25, 587.33, 659.25, 783.99, 880.00
    ];
    const noteIndex = comboCount % pentatonic.length;
    const freq = pentatonic[noteIndex];
    
    playCozyTone(freq, 'sine', 0.05, 0.8, 0.6); 
    if (comboCount > 3) {
        playCozyTone(freq * 1.5, 'sine', 0.1, 0.6, 0.2); 
    }
}

function playGameOverSound() {
    playCozyTone(130.81, 'sine', 0.1, 1.5, 0.8); 
    playCozyTone(98.00, 'sine', 0.2, 1.5, 0.8);  
}

// --- Variabel Game ---
let scene, camera, renderer;
let stack = [];
let overhangs = [];
let activeBlock = null;

const BLOCK_HEIGHT = 1;
const INITIAL_SIZE = 6;
const MOVE_SPEED_START = 0.12;
let currentSpeed = MOVE_SPEED_START;
const TOLERANCE = 0.25;

let score = 0;
let bestScore = parseInt(localStorage.getItem('stack_best_score_tier_v3')) || 0;
let combo = 0;
let gameStarted = false;
let gameOver = false;
let currentAxis = 'x';
let movingDir = 1;

let hueStart = Math.random();

// --- Elemen UI ---
const scoreDisplay = document.getElementById('score-display');
const bestScoreValDisplay = document.getElementById('best-score-val');
const bestTierBadge = document.getElementById('best-tier-badge');
const bestScoreContainer = document.getElementById('best-score-container');
const comboDisplay = document.getElementById('combo-display');

const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const restartBtn = document.getElementById('restart-btn');

const finalScoreText = document.getElementById('final-score-text');
const finalTierBadge = document.getElementById('final-tier-badge');
const finalTierName = document.getElementById('final-tier-name');

// --- Kemas kini UI Terbaik Permulaan ---
function updateBestScoreUI(scr) {
    bestScoreValDisplay.innerText = scr;
    const tier = getTierInfo(scr);
    bestTierBadge.innerText = tier.label;
    bestTierBadge.className = `text-3xl font-black italic pr-1 ${tier.className}`;
}
updateBestScoreUI(bestScore);


// --- Inisialisasi Tiga.js ---
function init() {
    scene = new THREE.Scene();

    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(10, 10, 10);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('game-container').appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    window.addEventListener('resize', onWindowResize, false);

    // Event interaksi
    const triggerInteraction = () => {
        initAudio();
        if (!gameStarted) startGame();
        else if (!gameOver) handleInteraction();
    };

    window.addEventListener('mousedown', triggerInteraction);
    window.addEventListener('touchstart', (e) => { 
        if(e.target === restartBtn) return; 
        e.preventDefault(); 
        triggerInteraction(); 
    }, { passive: false });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') triggerInteraction(); });

    restartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        resetGame();
    });

    createBase();
    animate();
}

function onWindowResize() {
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera.left = -d * aspect;
    camera.right = d * aspect;
    camera.top = d;
    camera.bottom = -d;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Material & Warna ---
function getBlockMaterial(index) {
    const color = new THREE.Color();
    color.setHSL((hueStart + index * 0.01) % 1, 0.5, 0.75);
    return new THREE.MeshLambertMaterial({ color: color });
}

function updateBackground(index) {
    const color1 = new THREE.Color().setHSL((hueStart + index * 0.01) % 1, 0.6, 0.85).getHexString();
    const color2 = new THREE.Color().setHSL((hueStart + index * 0.01 + 0.1) % 1, 0.6, 0.75).getHexString();
    document.body.style.background = `linear-gradient(135deg, #${color1} 0%, #${color2} 100%)`;
}

// --- Logika Permainan ---
function createBase() {
    const geometry = new THREE.BoxGeometry(INITIAL_SIZE, BLOCK_HEIGHT * 10, INITIAL_SIZE);
    const material = getBlockMaterial(0);
    const base = new THREE.Mesh(geometry, material);
    
    base.position.set(0, -BLOCK_HEIGHT * 5 + (BLOCK_HEIGHT / 2), 0);
    base.receiveShadow = true;
    base.castShadow = true;
    
    scene.add(base);
    stack.push({
        mesh: base,
        width: INITIAL_SIZE,
        depth: INITIAL_SIZE,
        x: 0,
        z: 0
    });
    
    updateBackground(0);
}

function spawnBlock() {
    const topBlock = stack[stack.length - 1];
    const width = topBlock.width;
    const depth = topBlock.depth;
    const yPos = stack.length * BLOCK_HEIGHT;
    
    const geometry = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const material = getBlockMaterial(stack.length);
    activeBlock = new THREE.Mesh(geometry, material);
    activeBlock.castShadow = true;
    activeBlock.receiveShadow = true;

    const startOffset = 15;
    if (currentAxis === 'x') {
        activeBlock.position.set(-startOffset, yPos, topBlock.z);
    } else {
        activeBlock.position.set(topBlock.x, yPos, -startOffset);
    }
    
    scene.add(activeBlock);
    movingDir = 1;
}

function handleInteraction() {
    const topBlock = stack[stack.length - 1];
    let tx1, tx2, cx1, cx2;
    let posDim = currentAxis;

    if (currentAxis === 'x') {
        tx1 = topBlock.x - topBlock.width / 2;
        tx2 = topBlock.x + topBlock.width / 2;
        cx1 = activeBlock.position.x - activeBlock.geometry.parameters.width / 2;
        cx2 = activeBlock.position.x + activeBlock.geometry.parameters.width / 2;
    } else {
        tx1 = topBlock.z - topBlock.depth / 2;
        tx2 = topBlock.z + topBlock.depth / 2;
        cx1 = activeBlock.position.z - activeBlock.geometry.parameters.depth / 2;
        cx2 = activeBlock.position.z + activeBlock.geometry.parameters.depth / 2;
    }

    const overlapMin = Math.max(tx1, cx1);
    const overlapMax = Math.min(tx2, cx2);
    const overlapSize = overlapMax - overlapMin;

    if (overlapSize <= 0) {
        dropFullBlock(activeBlock);
        endGame();
        return;
    }

    const delta = Math.abs(activeBlock.position[posDim] - topBlock[posDim]);

    if (delta <= TOLERANCE) {
        // SEMPURNA
        combo++;
        playPerfectSound(combo - 1);
        
        createPerfectFlash(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z, topBlock.width, topBlock.depth);
        showComboText(combo);
        
        activeBlock.position[posDim] = topBlock[posDim];
        
        let newWidth = topBlock.width;
        let newDepth = topBlock.depth;
        
        if (combo >= 5) {
            const growthAmount = 0.5;
            if (currentAxis === 'x' && newWidth < INITIAL_SIZE) newWidth = Math.min(INITIAL_SIZE, newWidth + growthAmount);
            if (currentAxis === 'z' && newDepth < INITIAL_SIZE) newDepth = Math.min(INITIAL_SIZE, newDepth + growthAmount);
            
            scene.remove(activeBlock);
            const geom = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
            const mat = getBlockMaterial(stack.length);
            activeBlock = new THREE.Mesh(geom, mat);
            activeBlock.position.set(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z);
            activeBlock.castShadow = true;
            activeBlock.receiveShadow = true;
            scene.add(activeBlock);
        }

        stack.push({ mesh: activeBlock, width: newWidth, depth: newDepth, x: activeBlock.position.x, z: activeBlock.position.z });

    } else {
        // DIPOTONG
        combo = 0;
        hideComboText();
        playDropSound();

        const newCenter = (overlapMin + overlapMax) / 2;
        
        let newWidth = currentAxis === 'x' ? overlapSize : topBlock.width;
        let newDepth = currentAxis === 'z' ? overlapSize : topBlock.depth;
        let newX = currentAxis === 'x' ? newCenter : topBlock.x;
        let newZ = currentAxis === 'z' ? newCenter : topBlock.z;

        scene.remove(activeBlock);
        const fittedGeometry = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
        const fittedMaterial = getBlockMaterial(stack.length);
        const fittedBlock = new THREE.Mesh(fittedGeometry, fittedMaterial);
        fittedBlock.position.set(newX, stack.length * BLOCK_HEIGHT, newZ);
        fittedBlock.castShadow = true;
        fittedBlock.receiveShadow = true;
        scene.add(fittedBlock);

        stack.push({ mesh: fittedBlock, width: newWidth, depth: newDepth, x: newX, z: newZ });

        // Serpihan jatuh
        let debrisMin, debrisMax;
        if (cx1 < tx1) {
            debrisMin = cx1;
            debrisMax = tx1;
        } else {
            debrisMin = tx2;
            debrisMax = cx2;
        }
        
        const debrisSize = debrisMax - debrisMin;
        const debrisCenter = (debrisMin + debrisMax) / 2;
        
        let debWidth = currentAxis === 'x' ? debrisSize : newWidth;
        let debDepth = currentAxis === 'z' ? debrisSize : newDepth;
        let debX = currentAxis === 'x' ? debrisCenter : newX;
        let debZ = currentAxis === 'z' ? debrisCenter : newZ;

        createDebris(debWidth, debDepth, debX, stack.length * BLOCK_HEIGHT, debZ, currentAxis, cx1 < tx1 ? -1 : 1, fittedMaterial);
    }

    score++;
    updateScoreUI();
    updateBackground(score);
    
    currentSpeed = Math.min(0.25, MOVE_SPEED_START + (score * 0.003));
    currentAxis = currentAxis === 'x' ? 'z' : 'x';
    spawnBlock();
}

function createDebris(width, depth, x, y, z, axis, direction, material) {
    const geom = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const mesh = new THREE.Mesh(geom, material);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    scene.add(mesh);

    overhangs.push({
        mesh: mesh,
        vy: 0,
        vx: axis === 'x' ? direction * 0.04 : 0,
        vz: axis === 'z' ? direction * 0.04 : 0,
        rx: axis === 'z' ? direction * 0.08 : 0,
        rz: axis === 'x' ? -direction * 0.08 : 0
    });
}

function dropFullBlock(blockMesh) {
    overhangs.push({
        mesh: blockMesh,
        vy: 0,
        vx: 0,
        vz: 0,
        rx: (Math.random() - 0.5) * 0.1,
        rz: (Math.random() - 0.5) * 0.1
    });
    activeBlock = null;
}

function createPerfectFlash(x, y, z, w, d) {
    let active = true;
    let currentScale = 1.0;
    
    const geom = new THREE.BoxGeometry(w, 0.1, d);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
    const flash = new THREE.Mesh(geom, mat);
    
    flash.position.set(x, y, z);
    scene.add(flash);

    const animateFlash = () => {
        if (!active) return;
        currentScale += 0.04;
        flash.scale.set(currentScale, 1, currentScale);
        flash.material.opacity -= 0.05;
        
        if (flash.material.opacity <= 0) {
            scene.remove(flash);
            flash.geometry.dispose();
            flash.material.dispose();
            active = false;
        } else {
            requestAnimationFrame(animateFlash);
        }
    };
    animateFlash();
}

// --- Fungsi UI ---
function updateScoreUI() {
    scoreDisplay.innerText = score;
    scoreDisplay.classList.remove('scale-100');
    scoreDisplay.classList.add('scale-110');
    setTimeout(() => {
        scoreDisplay.classList.remove('scale-110');
        scoreDisplay.classList.add('scale-100');
    }, 150);
}

function showComboText(count) {
    if (count > 1) {
        comboDisplay.innerText = `Sempurna x${count}!`;
        comboDisplay.classList.remove('combo-active');
        void comboDisplay.offsetWidth; // trigger reflow
        comboDisplay.classList.add('combo-active');
    }
}

function hideComboText() {
    comboDisplay.classList.remove('combo-active');
    comboDisplay.style.opacity = 0;
}

function startGame() {
    startScreen.classList.add('opacity-0');
    setTimeout(() => { 
        startScreen.classList.add('hidden'); 
    }, 500);
    gameStarted = true;
    spawnBlock();
}

function endGame() {
    gameOver = true;
    playGameOverSound();
    
    const currentTierInfo = getTierInfo(score);
    finalScoreText.innerText = `${score}`;
    finalTierBadge.innerText = currentTierInfo.label;
    finalTierBadge.className = `text-5xl font-black italic drop-shadow-lg ${currentTierInfo.className}`;
    finalTierName.innerText = currentTierInfo.name;
    finalTierName.className = `text-xl font-bold uppercase tracking-widest ml-2 ${currentTierInfo.className}`;

    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('stack_best_score_tier_v3', bestScore.toString());
        updateBestScoreUI(bestScore);
        
        bestScoreContainer.classList.add('scale-110', 'border-green-400');
        setTimeout(() => bestScoreContainer.classList.remove('scale-110', 'border-green-400'), 800);
    }
    
    gameOverScreen.classList.remove('hidden');
    setTimeout(() => {
        gameOverScreen.classList.remove('opacity-0');
    }, 100);
}

function resetGame() {
    stack.forEach(b => scene.remove(b.mesh));
    overhangs.forEach(o => scene.remove(o.mesh));
    if (activeBlock) scene.remove(activeBlock);
    
    stack = [];
    overhangs = [];
    activeBlock = null;
    
    score = 0;
    combo = 0;
    currentSpeed = MOVE_SPEED_START;
    currentAxis = 'x';
    gameOver = false;
    hueStart = Math.random(); 
    
    updateScoreUI();
    hideComboText();
    
    camera.position.y = 10;
    
    gameOverScreen.classList.add('opacity-0');
    setTimeout(() => {
        gameOverScreen.classList.add('hidden');
        createBase();
        spawnBlock();
    }, 500);
}

// --- Loop Animasi ---
function animate() {
    requestAnimationFrame(animate);

    if (gameStarted && !gameOver && activeBlock) {
        activeBlock.position[currentAxis] += currentSpeed * movingDir;

        const bounds = 15;
        if (activeBlock.position[currentAxis] > bounds || activeBlock.position[currentAxis] < -bounds) {
            movingDir *= -1; 
            activeBlock.position[currentAxis] = Math.sign(activeBlock.position[currentAxis]) * bounds;
        }
    }

    if (stack.length > 0) {
        const targetY = (stack.length * BLOCK_HEIGHT) + 5;
        camera.position.y += (targetY - camera.position.y) * 0.08;
    }

    for (let i = overhangs.length - 1; i >= 0; i--) {
        const oh = overhangs[i];
        oh.vy -= 0.015;
        oh.mesh.position.y += oh.vy;
        oh.mesh.position.x += oh.vx;
        oh.mesh.position.z += oh.vz;
        
        oh.mesh.rotation.x += oh.rx;
        oh.mesh.rotation.z += oh.rz;

        if (oh.mesh.position.y < camera.position.y - 30) {
            scene.remove(oh.mesh);
            oh.mesh.geometry.dispose();
            oh.mesh.material.dispose();
            overhangs.splice(i, 1);
        }
    }

    renderer.render(scene, camera);
}

window.onload = init;

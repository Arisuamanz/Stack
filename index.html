<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack - World Record Attempt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            touch-action: none; /* Prevent zooming/scrolling on mobile */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to the game container */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        
        /* Transition for smooth background color changes */
        body {
            transition: background 2s ease;
        }
    </style>
</head>
<body>

    <!-- 3D Game Canvas Container -->
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="p-6">
        <div class="flex justify-between items-start w-full">
            <div id="score-display" class="text-6xl font-light text-white drop-shadow-md transition-all transform scale-100">0</div>
            <div class="text-right">
                <div id="combo-display" class="text-xl font-bold text-white drop-shadow-md opacity-0 transition-opacity">Perfect!</div>
                <div id="best-score" class="text-lg font-medium text-white/80 drop-shadow-md">Best: 0</div>
            </div>
        </div>

        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/20 backdrop-blur-sm pointer-events-auto transition-opacity duration-300">
            <h1 class="text-5xl font-bold text-white mb-2 drop-shadow-lg tracking-wider">STACK</h1>
            <p class="text-white/90 mb-8 text-lg drop-shadow">Tap or click to drop the blocks</p>
            <button id="start-btn" class="px-8 py-4 bg-white text-gray-800 font-bold rounded-full shadow-xl hover:bg-gray-100 transform hover:scale-105 transition-all active:scale-95 text-xl">
                Play Now
            </button>
        </div>

        <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 backdrop-blur-md pointer-events-auto opacity-0 hidden transition-opacity duration-300">
            <h2 class="text-4xl font-bold text-white mb-2 drop-shadow-lg">Game Over</h2>
            <p class="text-white/90 mb-6 text-xl" id="final-score-text">Score: 0</p>
            <button id="restart-btn" class="px-8 py-4 bg-white text-gray-800 font-bold rounded-full shadow-xl hover:bg-gray-100 transform hover:scale-105 transition-all active:scale-95 text-xl">
                Try Again
            </button>
        </div>
    </div>

<script>
/**
 * STACK GAME LOGIC
 * Built with Three.js
 */

// --- Game Variables ---
let scene, camera, renderer;
let stack = [];
let overhangs = [];
let activeBlock = null;

const BLOCK_HEIGHT = 1;
const INITIAL_SIZE = 6;
const MOVE_SPEED_START = 0.15;
let currentSpeed = MOVE_SPEED_START;
const TOLERANCE = 0.15; // How close to perfect alignment needed to snap

let score = 0;
let bestScore = localStorage.getItem('stack_best_score') || 0;
let combo = 0;
let gameStarted = false;
let gameOver = false;
let currentAxis = 'x'; // 'x' or 'z'
let movingDir = 1;

// Colors
let hueStart = Math.random();

// UI Elements
const scoreDisplay = document.getElementById('score-display');
const bestScoreDisplay = document.getElementById('best-score');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');
const finalScoreText = document.getElementById('final-score-text');

bestScoreDisplay.innerText = `Best: ${bestScore}`;

// --- Initialization ---
function init() {
    // 1. Scene Setup
    scene = new THREE.Scene();

    // 2. Camera Setup (Orthographic for isometric look)
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(10, 10, 10);
    camera.lookAt(0, 0, 0);

    // 3. Renderer Setup
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('game-container').appendChild(renderer.domElement);

    // 4. Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    // Handle Resize
    window.addEventListener('resize', onWindowResize, false);

    // Controls
    window.addEventListener('mousedown', handleInteraction);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(); }, { passive: false });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInteraction(); });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', resetGame);

    // Initial setup
    createBase();
    animate();
}

function onWindowResize() {
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    camera.left = -d * aspect;
    camera.right = d * aspect;
    camera.top = d;
    camera.bottom = -d;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Materials & Colors ---
function getBlockMaterial(index) {
    const color = new THREE.Color();
    color.setHSL((hueStart + index * 0.015) % 1, 0.6, 0.6);
    return new THREE.MeshLambertMaterial({ color: color });
}

function updateBackground(index) {
    const color1 = new THREE.Color().setHSL((hueStart + index * 0.015) % 1, 0.7, 0.85).getHexString();
    const color2 = new THREE.Color().setHSL((hueStart + index * 0.015 + 0.1) % 1, 0.7, 0.75).getHexString();
    document.body.style.background = `linear-gradient(135deg, #${color1} 0%, #${color2} 100%)`;
}

// --- Game Logic ---
function createBase() {
    const geometry = new THREE.BoxGeometry(INITIAL_SIZE, BLOCK_HEIGHT * 10, INITIAL_SIZE);
    const material = getBlockMaterial(0);
    const base = new THREE.Mesh(geometry, material);
    
    // Position base so its top is at y=0
    base.position.set(0, -BLOCK_HEIGHT * 5 + (BLOCK_HEIGHT / 2), 0);
    base.receiveShadow = true;
    base.castShadow = true;
    
    scene.add(base);
    stack.push({
        mesh: base,
        width: INITIAL_SIZE,
        depth: INITIAL_SIZE,
        x: 0,
        z: 0
    });
    
    updateBackground(0);
}

function spawnBlock() {
    const topBlock = stack[stack.length - 1];
    const width = topBlock.width;
    const depth = topBlock.depth;
    const yPos = stack.length * BLOCK_HEIGHT;
    
    const geometry = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const material = getBlockMaterial(stack.length);
    activeBlock = new THREE.Mesh(geometry, material);
    activeBlock.castShadow = true;
    activeBlock.receiveShadow = true;

    // Spawn far away depending on axis
    const startOffset = 15;
    if (currentAxis === 'x') {
        activeBlock.position.set(-startOffset, yPos, topBlock.z);
    } else {
        activeBlock.position.set(topBlock.x, yPos, -startOffset);
    }
    
    scene.add(activeBlock);
    movingDir = 1; // Always start moving positively towards the center
}

function handleInteraction() {
    if (!gameStarted || gameOver) return;

    const topBlock = stack[stack.length - 1];
    
    // 1. Calculate Intersection
    let tx1, tx2, cx1, cx2; // top min/max, current min/max
    let isPerfect = false;
    let sizeDim = currentAxis === 'x' ? 'width' : 'depth';
    let posDim = currentAxis;

    if (currentAxis === 'x') {
        tx1 = topBlock.x - topBlock.width / 2;
        tx2 = topBlock.x + topBlock.width / 2;
        cx1 = activeBlock.position.x - activeBlock.geometry.parameters.width / 2;
        cx2 = activeBlock.position.x + activeBlock.geometry.parameters.width / 2;
    } else {
        tx1 = topBlock.z - topBlock.depth / 2;
        tx2 = topBlock.z + topBlock.depth / 2;
        cx1 = activeBlock.position.z - activeBlock.geometry.parameters.depth / 2;
        cx2 = activeBlock.position.z + activeBlock.geometry.parameters.depth / 2;
    }

    const overlapMin = Math.max(tx1, cx1);
    const overlapMax = Math.min(tx2, cx2);
    const overlapSize = overlapMax - overlapMin;

    // 2. Evaluate Hit, Miss, or Perfect
    if (overlapSize <= 0) {
        // Complete Miss -> Game Over
        dropFullBlock(activeBlock);
        endGame();
        return;
    }

    const delta = Math.abs(activeBlock.position[posDim] - topBlock[posDim]);

    if (delta <= TOLERANCE) {
        // Perfect Placement
        isPerfect = true;
        combo++;
        
        // Visual flair for perfect
        createPerfectFlash(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z, topBlock.width, topBlock.depth);
        showComboText(combo);
        
        // Snap to exact position
        activeBlock.position[posDim] = topBlock[posDim];
        
        // Block Growth Mechanics (If combo > 5, grow block slightly)
        let newWidth = topBlock.width;
        let newDepth = topBlock.depth;
        
        if (combo >= 5) {
            if (currentAxis === 'x' && newWidth < INITIAL_SIZE) newWidth = Math.min(INITIAL_SIZE, newWidth + 0.5);
            if (currentAxis === 'z' && newDepth < INITIAL_SIZE) newDepth = Math.min(INITIAL_SIZE, newDepth + 0.5);
            
            // Rebuild mesh if it grew
            scene.remove(activeBlock);
            const geom = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
            const mat = getBlockMaterial(stack.length);
            activeBlock = new THREE.Mesh(geom, mat);
            activeBlock.position.set(topBlock.x, stack.length * BLOCK_HEIGHT, topBlock.z);
            activeBlock.castShadow = true;
            activeBlock.receiveShadow = true;
            scene.add(activeBlock);
        }

        stack.push({
            mesh: activeBlock,
            width: newWidth,
            depth: newDepth,
            x: activeBlock.position.x,
            z: activeBlock.position.z
        });

    } else {
        // Partial Hit -> Slice Block
        combo = 0;
        hideComboText();

        const newCenter = (overlapMin + overlapMax) / 2;
        
        let newWidth = currentAxis === 'x' ? overlapSize : topBlock.width;
        let newDepth = currentAxis === 'z' ? overlapSize : topBlock.depth;
        let newX = currentAxis === 'x' ? newCenter : topBlock.x;
        let newZ = currentAxis === 'z' ? newCenter : topBlock.z;

        // Create exactly fitted block
        scene.remove(activeBlock);
        const fittedGeometry = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, newDepth);
        const fittedMaterial = getBlockMaterial(stack.length);
        const fittedBlock = new THREE.Mesh(fittedGeometry, fittedMaterial);
        fittedBlock.position.set(newX, stack.length * BLOCK_HEIGHT, newZ);
        fittedBlock.castShadow = true;
        fittedBlock.receiveShadow = true;
        scene.add(fittedBlock);

        stack.push({
            mesh: fittedBlock,
            width: newWidth,
            depth: newDepth,
            x: newX,
            z: newZ
        });

        // Create Debris
        let debrisMin, debrisMax;
        if (cx1 < tx1) { // Overhang on negative side
            debrisMin = cx1;
            debrisMax = tx1;
        } else { // Overhang on positive side
            debrisMin = tx2;
            debrisMax = cx2;
        }
        
        const debrisSize = debrisMax - debrisMin;
        const debrisCenter = (debrisMin + debrisMax) / 2;
        
        let debWidth = currentAxis === 'x' ? debrisSize : newWidth;
        let debDepth = currentAxis === 'z' ? debrisSize : newDepth;
        let debX = currentAxis === 'x' ? debrisCenter : newX;
        let debZ = currentAxis === 'z' ? debrisCenter : newZ;

        createDebris(debWidth, debDepth, debX, stack.length * BLOCK_HEIGHT, debZ, currentAxis, cx1 < tx1 ? -1 : 1, fittedMaterial);
    }

    // 3. Setup Next Turn
    score++;
    updateScoreUI();
    updateBackground(score);
    
    // Increase speed slightly over time
    currentSpeed = Math.min(0.4, MOVE_SPEED_START + (score * 0.005));
    
    currentAxis = currentAxis === 'x' ? 'z' : 'x';
    spawnBlock();
}

function createDebris(width, depth, x, y, z, axis, direction, material) {
    const geom = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
    const mesh = new THREE.Mesh(geom, material);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    scene.add(mesh);

    overhangs.push({
        mesh: mesh,
        vy: 0,
        vx: axis === 'x' ? direction * 0.05 : 0,
        vz: axis === 'z' ? direction * 0.05 : 0,
        rx: axis === 'z' ? direction * 0.1 : 0,
        rz: axis === 'x' ? -direction * 0.1 : 0
    });
}

function dropFullBlock(blockMesh) {
    overhangs.push({
        mesh: blockMesh,
        vy: 0,
        vx: 0,
        vz: 0,
        rx: (Math.random() - 0.5) * 0.1,
        rz: (Math.random() - 0.5) * 0.1
    });
    activeBlock = null;
}

function createPerfectFlash(x, y, z, w, d) {
    // Simple expanding white plane
    const geom = new THREE.PlaneGeometry(w + 1, d + 1);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
    const flash = new THREE.Mesh(geom, mat);
    flash.rotation.x = -Math.PI / 2;
    flash.position.set(x, y - (BLOCK_HEIGHT/2) + 0.01, z); // Just below the top surface
    scene.add(flash);

    // Quick animation loop for flash
    let scale = 1;
    let opacity = 0.8;
    const animateFlash = () => {
        scale += 0.1;
        opacity -= 0.05;
        flash.scale.set(scale, scale, 1);
        flash.material.opacity = opacity;
        if (opacity > 0) {
            requestAnimationFrame(animateFlash);
        } else {
            scene.remove(flash);
            flash.geometry.dispose();
            flash.material.dispose();
        }
    };
    animateFlash();
}

// --- UI Functions ---
function updateScoreUI() {
    scoreDisplay.innerText = score;
    // Tiny pop animation
    scoreDisplay.classList.remove('scale-100');
    scoreDisplay.classList.add('scale-110');
    setTimeout(() => {
        scoreDisplay.classList.remove('scale-110');
        scoreDisplay.classList.add('scale-100');
    }, 100);
}

function showComboText(count) {
    if (count > 1) {
        comboDisplay.innerText = `Perfect x${count}!`;
        comboDisplay.style.opacity = 1;
        
        // Shake text slightly
        comboDisplay.style.transform = `translateY(-5px)`;
        setTimeout(() => { comboDisplay.style.transform = `translateY(0)`; }, 100);
    }
}

function hideComboText() {
    comboDisplay.style.opacity = 0;
}

function startGame() {
    startScreen.classList.add('opacity-0', 'hidden');
    setTimeout(() => { startScreen.style.display = 'none'; }, 300);
    gameStarted = true;
    spawnBlock();
}

function endGame() {
    gameOver = true;
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('stack_best_score', bestScore);
        bestScoreDisplay.innerText = `Best: ${bestScore}`;
    }
    
    finalScoreText.innerText = `Score: ${score}`;
    
    gameOverScreen.classList.remove('hidden');
    // Small delay to allow CSS to render block before fading in
    setTimeout(() => {
        gameOverScreen.classList.remove('opacity-0');
    }, 50);
}

function resetGame() {
    // Clear scene
    stack.forEach(b => scene.remove(b.mesh));
    overhangs.forEach(o => scene.remove(o.mesh));
    if (activeBlock) scene.remove(activeBlock);
    
    stack = [];
    overhangs = [];
    activeBlock = null;
    
    score = 0;
    combo = 0;
    currentSpeed = MOVE_SPEED_START;
    currentAxis = 'x';
    gameOver = false;
    hueStart = Math.random(); // New color palette
    
    updateScoreUI();
    hideComboText();
    
    gameOverScreen.classList.add('opacity-0');
    setTimeout(() => {
        gameOverScreen.classList.add('hidden');
        createBase();
        spawnBlock();
    }, 300);
}

// --- Main Animation Loop ---
function animate() {
    requestAnimationFrame(animate);

    // 1. Move Active Block
    if (gameStarted && !gameOver && activeBlock) {
        activeBlock.position[currentAxis] += currentSpeed * movingDir;

        // Ping-pong boundary check
        const bounds = 15;
        if (activeBlock.position[currentAxis] > bounds || activeBlock.position[currentAxis] < -bounds) {
            movingDir *= -1; // Reverse direction
            // Snap inside bounds to prevent getting stuck
            activeBlock.position[currentAxis] = Math.sign(activeBlock.position[currentAxis]) * bounds;
        }
    }

    // 2. Camera Lerp (Follow Stack)
    if (stack.length > 0) {
        const targetY = (stack.length * BLOCK_HEIGHT) + 5;
        camera.position.y += (targetY - camera.position.y) * 0.1;
    }

    // 3. Animate Debris (Gravity)
    for (let i = overhangs.length - 1; i >= 0; i--) {
        const oh = overhangs[i];
        oh.vy -= 0.02; // Gravity
        oh.mesh.position.y += oh.vy;
        oh.mesh.position.x += oh.vx;
        oh.mesh.position.z += oh.vz;
        
        oh.mesh.rotation.x += oh.rx;
        oh.mesh.rotation.z += oh.rz;

        // Remove if fallen out of view
        if (oh.mesh.position.y < camera.position.y - 30) {
            scene.remove(oh.mesh);
            overhangs.splice(i, 1);
        }
    }

    renderer.render(scene, camera);
}

// Boot up
window.onload = init;

</script>
</body>
</html>
